<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assests/openai-brands-solid-full.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>ChatGPT</title>
</head>

<body>

<div class="main">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="sticky-nav">
            <div class="image">
                
            </div>

            <div class="pair">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>

        <div class="menu">

            <div class="items">
                <i class="fa-solid fa-pen-to-square newchat"></i>
                <span>New Chat</span>
            </div>

            <div class="items">
                <i class="fa-solid fa-book library"></i>
                <span>Library</span>
            </div>

            <div class="items">
                <i class="fa-solid fa-book library"></i>
                <span>Project</span>
            </div>

            <div class="items">
                <i class="fa-regular fa-clock library"></i>
                <span>Scheduled</span>
            </div>

            <div class="items">
                <i class="fa-solid fa-border-all library"></i>
                <span>Apps</span>
            </div>

            <div class="items">
                <i class="fa-solid fa-code library"></i>
                <span>Codex</span>
            </div>

            <div class="items">
                <span>... More</span>
            </div>

        </div>

        <div class="center">

            <div class="pinned">
                Pinned
                <i class="fa-solid fa-angle-down bottam" style="opacity:.4;"></i>
            </div>

            <div class="chat-name">
                <i class="fa-solid fa-cloud"></i>
                <span>UHI and WASH Explained</span>
            </div>

            <div class="recent">
                Recent
            </div>

        </div>

        <div class="profile">

            <div class="left">

                <div class="avatar">
                    JA
                </div>

                <div class="info">
                    <h4>Jatin</h4>
                    <p>Go</p>
                </div>

            </div>

            <i class="fa-solid fa-store"></i>

        </div>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="content">
                <div class="upper-part">
            <div class="logo"><h2>ChatGPT<i class="fa-solid fa-angle-down bottam chatgpt"></i></h2></div>
            <div class="cloud"><i class="fa-regular fa-comment"></i></div>
           </div>
           <div class="prompt">What’s on the agenda today?</div>
           <div class="search-box">
    <button class="voice-btn">
        <i class="fa-solid fa-plus"></i>
    </button>

    <input type="text" placeholder="Ask anything">

    <div class="right-icons">
        <button class="voice-btn">
          <i class="fa-solid fa-microphone"></i>
        </button>

        <button class="voice-btn">
           <i class="fa-solid fa-image"></i>
        </button>
    </div>
</div>
<div class="badges">
 <div class="badge">
    <button class="first">
        <i class="fa-solid fa-image"></i>
        Create an image
    </button>
</div>
 <div class="badge">
    <button class="first">
        <i class="fa-solid fa-image"></i>
        Create an image
    </button>
</div>

 <div class="badge">
    <button class="first">
        <i class="fa-solid fa-image"></i>
        Create an image
    </button>
</div>
</div>
        </div>
    </div>

</div>

</body>
</html>
